<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthCare App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">HealthCare+</div>
  <nav>
    <a href="#">Doctors</a>
    <a href="#">Consult Online</a>
    <a href="#">Login</a>
  </nav>
</header>

<section class="hero">
  <h1>Find & Book Doctors</h1>
  <p>Consult top doctors instantly</p>
  <div class="search-box">
    <input type="text" placeholder="Search doctors, specialties...">
    <button>Search</button>
  </div>
</section>

<section class="filters">
  <button>All</button>
  <button>Cardiologist</button>
  <button>Dermatologist</button>
  <button>Neurologist</button>
</section>

<section class="doctor-list">

  <div class="doctor-card">
    <div class="avatar">DS</div>
    <div class="info">
      <h3>Dr. Sharma</h3>
      <p>Cardiologist • 10 yrs exp</p>
      <span class="rating">⭐ 4.5</span>
    </div>
    <button class="book">Book</button>
  </div>

  <div class="doctor-card">
    <div class="avatar">DM</div>
    <div class="info">
      <h3>Dr. Mehta</h3>
      <p>Dermatologist • 7 yrs exp</p>
      <span class="rating">⭐ 4.2</span>
    </div>
    <button class="book">Book</button>
  </div>

  <div class="doctor-card">
    <div class="avatar">DS</div>
    <div class="info">
      <h3>Dr. Singh</h3>
      <p>Neurologist • 12 yrs exp</p>
      <span class="rating">⭐ 4.8</span>
    </div>
    <button class="book">Book</button>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
